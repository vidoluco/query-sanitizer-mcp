name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install "fastmcp>=2.0" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=server --cov=scripts/ledger --cov-report=term-missing

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint server.py and scripts/
        run: ruff check server.py scripts/ tests/

  type-check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mypy
        run: pip install "fastmcp>=2.0" mypy

      - name: Run mypy
        run: mypy server.py --ignore-missing-imports --python-version 3.10
